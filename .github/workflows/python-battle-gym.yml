name: Battle Gym CI

on:
  pull_request:
    branches:
      - variant-dev
    paths:
      - 'python/battle-gym/**'
      - '.github/workflows/python-battle-gym.yml'
  push:
    branches:
      - variant-dev
      - 'agent/**'
    paths:
      - 'python/battle-gym/**'
      - '.github/workflows/python-battle-gym.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: battle-gym-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/battle-gym/pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e 'python/battle-gym[dev]'

      - name: Lint and type check
        run: |
          ruff check python/battle-gym
          ruff format --check python/battle-gym
          mypy python/battle-gym/src

      - name: Run tests
        run: pytest python/battle-gym
