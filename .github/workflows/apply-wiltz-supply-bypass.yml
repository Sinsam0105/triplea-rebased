name: Apply Wiltz supply bypass

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/wiltz-supply-bypass
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Add southern supply bypass and regression coverage
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          xml_paths = [
              Path("maps/small_front_meuse/map/games/Small_Front_Meuse.xml"),
              Path("game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml"),
          ]
          bypass_block = """    <attachment name="supplyTerritoryAttachment" attachTo="Libramont" javaClass="games.strategy.triplea.attachments.SupplyTerritoryAttachment" type="territory">
              <option name="roadConnection" value="Neufchateau"/>
            </attachment>
          """
          losheim_marker = "    <attachment name=\"territoryAttachment\" attachTo=\"Losheim Gap\""
          for path in xml_paths:
              text = path.read_text()
              if "supplyTerritoryAttachment\" attachTo=\"Libramont\"" not in text:
                  if text.count(losheim_marker) != 1:
                      raise RuntimeError(f"could not find unique Losheim Gap marker in {path}")
                  text = text.replace(losheim_marker, bypass_block + losheim_marker, 1)
                  path.write_text(text)
              ET.parse(path)

          test_path = Path("game-app/smoke-testing/src/test/java/games/strategy/engine/data/SmallFrontAiGameTest.java")
          test_text = test_path.read_text()
          test_text = test_text.replace(
              "void centralSupplyGraphUsesIndirectSecondAxis()",
              "void southernSupplyGraphBypassesWiltz()",
          )
          test_text = test_text.replace(
              "assertThat(SupplyNetworkResolver.getRoadNeighbors(libramont, data)).doesNotContain(neufchateau);",
              """assertThat(SupplyNetworkResolver.getRoadNeighbors(libramont, data)).contains(neufchateau);

              final Territory bastogne = data.getMap().getTerritoryOrThrow(\"Bastogne\");
              final Territory martelange = data.getMap().getTerritoryOrThrow(\"Martelange\");
              final Territory saintHubert = data.getMap().getTerritoryOrThrow(\"Saint-Hubert\");
              final Territory wiltz = data.getMap().getTerritoryOrThrow(\"Wiltz\");
              final GamePlayer germans = data.getPlayerList().getPlayerId(\"Germans\");
              final GamePlayer americans = data.getPlayerList().getPlayerId(\"Americans\");
              wiltz.setOwner(germans);

              assertThat(SupplyNetworkResolver.getSuppliedTerritories(americans, data))
                  .contains(bastogne, martelange, saintHubert, libramont);""",
          )
          if "void southernSupplyGraphBypassesWiltz()" not in test_text:
              raise RuntimeError("test method rename failed")
          if ".contains(bastogne, martelange, saintHubert, libramont);" not in test_text:
              raise RuntimeError("supply bypass regression assertion was not inserted")
          test_path.write_text(test_text)

          docs_path = Path("docs/small-front-meuse-rulebook.md")
          docs_text = docs_path.read_text()
          note = """\n### 7.1.1 남부 우회 보급축\n\n`Neufchateau–Libramont–Martelange–Bastogne` 도로망은 남부 미군의 우회 보급축을 형성한다. 따라서 **Wiltz 한 곳만 상실해도 Bastogne, Martelange, Saint-Hubert, Libramont가 즉시 고립되지는 않는다.** 독일군이 이 축을 차단하려면 Neufchateau, Libramont, Martelange 등 남부 전선의 실제 연결 지역을 추가로 점령해야 한다.\n"""
          anchor = "보급 도로는 양방향으로 취급된다.\n"
          if note.strip() not in docs_text:
              if docs_text.count(anchor) != 1:
                  raise RuntimeError("rulebook supply anchor not found")
              docs_text = docs_text.replace(anchor, anchor + note, 1)
              docs_path.write_text(docs_text)
          PY

          ./gradlew spotlessApply
          ./gradlew :game-app:smoke-testing:test \
            --tests games.strategy.engine.data.SmallFrontAiGameTest.southernSupplyGraphBypassesWiltz \
            --no-daemon

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add maps/small_front_meuse/map/games/Small_Front_Meuse.xml \
                  game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml \
                  game-app/smoke-testing/src/test/java/games/strategy/engine/data/SmallFrontAiGameTest.java \
                  docs/small-front-meuse-rulebook.md
          git commit -m "Add southern supply bypass around Wiltz"
          git push origin HEAD:agent/wiltz-supply-bypass
