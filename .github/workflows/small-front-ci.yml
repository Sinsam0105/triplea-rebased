name: Small Front CI

on:
  pull_request:
    branches:
      - variant-dev
  push:
    branches:
      - variant-dev
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: agent/milestone-13-strategic-agent
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Format strategic sources
        run: ./gradlew :game-core:spotlessApply :game-headless:spotlessApply

      - name: Commit formatted strategic sources
        shell: bash
        run: |
          if git diff --quiet -- '*.java'; then
            echo 'No Java formatting changes to commit'
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -- '*.java'
            git commit -m 'Format strategic simulation sources'
            git push origin HEAD:agent/milestone-13-strategic-agent
          fi

      - name: Run focused tests and formatting checks
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :game-core:test :game-headless:test spotlessCheck --stacktrace 2>&1 | tee gradle.log

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-gradle-log
          path: gradle.log
          if-no-files-found: error
