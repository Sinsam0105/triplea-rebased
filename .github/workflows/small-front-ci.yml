name: Small Front CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - small-front-scoring
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Patch Poland redeployment steps
        if: github.event.pull_request.head.ref == 'agent/poland-redeployment-scenario'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          paths = (
              Path("maps/small_front_poland/tools/generate_map.py"),
              Path("maps/small_front_poland/tools/validate_map.py"),
              Path("maps/small_front_poland/map/games/Small_Front_Poland.xml"),
              Path("game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Poland.xml"),
          )
          for path in paths:
              text = path.read_text()
              text = text.replace("germanRedeployment", "germanNonCombatMove")
              text = text.replace("polishRedeployment", "polishNonCombatMove")
              path.write_text(text)
          PY
          python -m pip install --disable-pip-version-check pillow
          python maps/small_front_poland/tools/generate_map.py maps/small_front_poland
          cp maps/small_front_poland/map/games/Small_Front_Poland.xml game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Poland.xml
          python maps/small_front_poland/tools/validate_map.py maps/small_front_poland game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Poland.xml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add maps/small_front_poland game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Poland.xml
          if ! git diff --cached --quiet; then
            git commit -m 'Use non-combat step names for Poland redeployment'
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          fi

      - name: Validate Poland scenario package
        shell: bash
        run: |
          python -m py_compile maps/small_front_poland/tools/generate_map.py maps/small_front_poland/tools/validate_map.py
          python maps/small_front_poland/tools/validate_map.py maps/small_front_poland game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Poland.xml

      - name: Run focused tests and formatting checks
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :game-core:test :game-headless:test spotlessCheck --stacktrace 2>&1 | tee gradle.log

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-gradle-log
          path: gradle.log
          if-no-files-found: error
