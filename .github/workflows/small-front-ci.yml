name: Small Front CI

on:
  pull_request:
    branches:
      - variant-dev
  push:
    branches:
      - variant-dev
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Spotless patch
        shell: bash
        run: |
          ./gradlew spotlessApply
          git diff --binary > spotless.patch

      - name: Run focused tests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :game-core:test :game-headless:test --stacktrace 2>&1 | tee gradle.log

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-ci-diagnostics
          path: |
            gradle.log
            spotless.patch
          if-no-files-found: error

      - name: Verify committed formatting
        if: always()
        shell: bash
        run: |
          if [[ -s spotless.patch ]]; then
            echo 'Spotless changed committed source files.'
            exit 1
          fi
