name: Small Front CI

on:
  pull_request:
    branches:
      - variant-dev
  push:
    branches:
      - variant-dev
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run focused tests and formatting checks
        run: ./gradlew :game-core:test :game-headless:test spotlessCheck --stacktrace
