name: Small Front CI

on:
  push:
    branches:
      - agent/separate-air-ground-combat
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: separate-air-ground-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: >-
      github.ref == 'refs/heads/agent/separate-air-ground-combat' &&
      !contains(github.event.head_commit.message, '[skip separate-apply]')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: agent/separate-air-ground-combat
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply, format, and test
        id: validation
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/development/small-front-roadmap.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '## 9. Separate air and ground combat\n\nStatus: next.\n\n',
              '## 9. Separate air and ground combat\n\n',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
          python tools/apply_separate_air_ground_combat.py > /tmp/apply.log 2>&1
          apply_status=$?
          test_status=0
          if [[ $apply_status -eq 0 ]]; then
            python - <<'PY'
            from pathlib import Path
            path = Path('game-app/game-core/src/test/java/games/strategy/triplea/delegate/battle/CombatDomainParticipantsTest.java')
            text = path.read_text(encoding='utf-8')
            text = text.replace(
                'import games.strategy.engine.data.GamePlayer;\n',
                'import games.strategy.engine.data.GameData;\n'
                'import games.strategy.engine.data.GamePlayer;\n'
                'import games.strategy.engine.data.RelationshipTracker;\n',
                1,
            )
            text = text.replace(
                '  private final GameState data = mock(GameState.class);\n'
                '  private final GameProperties properties = mock(GameProperties.class);\n'
                '  private final GamePlayer attacker = mock(GamePlayer.class);\n'
                '  private final GamePlayer defender = mock(GamePlayer.class);\n',
                '  private final GameState data = mock(GameState.class);\n'
                '  private final GameProperties properties = mock(GameProperties.class);\n'
                '  private final GameData playerData = mock(GameData.class);\n'
                '  private final RelationshipTracker relationships = mock(RelationshipTracker.class);\n'
                '  private final GamePlayer attacker = mock(GamePlayer.class);\n'
                '  private final GamePlayer defender = mock(GamePlayer.class);\n',
                1,
            )
            text = text.replace(
                '    when(data.getProperties()).thenReturn(properties);\n'
                '    when(attacker.isAtWar(defender)).thenReturn(true);\n',
                '    when(data.getProperties()).thenReturn(properties);\n'
                '    when(attacker.getData()).thenReturn(playerData);\n'
                '    when(playerData.getRelationshipTracker()).thenReturn(relationships);\n'
                '    when(relationships.isAtWar(attacker, defender)).thenReturn(true);\n',
                1,
            )
            path.write_text(text, encoding='utf-8')
            PY
            set -o pipefail
            ./gradlew spotlessApply :game-core:test :game-headless:test --stacktrace 2>&1 | tee /tmp/gradle.log
            test_status=$?
          else
            : > /tmp/gradle.log
          fi
          echo "apply_status=$apply_status" >> "$GITHUB_OUTPUT"
          echo "test_status=$test_status" >> "$GITHUB_OUTPUT"
          if [[ $apply_status -ne 0 || $test_status -ne 0 ]]; then
            exit 1
          fi

      - name: Commit validated implementation
        if: success()
        shell: bash
        run: |
          git fetch origin variant-dev
          git show origin/variant-dev:.github/workflows/small-front-ci.yml > .github/workflows/small-front-ci.yml
          rm tools/apply_separate_air_ground_combat.py
          rm -f docs/development/validation/separate-air-ground.log.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[skip separate-apply] Separate air and ground combat"
          git push origin HEAD:agent/separate-air-ground-combat

      - name: Commit validation diagnostics
        if: failure()
        shell: bash
        run: |
          cp /tmp/apply.log /tmp/apply-saved.log || true
          cp /tmp/gradle.log /tmp/gradle-saved.log || true
          git reset --hard "$GITHUB_SHA"
          mkdir -p docs/development/validation
          {
            echo '# Separate air and ground combat validation failure'
            echo
            echo "apply status: ${{ steps.validation.outputs.apply_status }}"
            echo "test status: ${{ steps.validation.outputs.test_status }}"
            echo
            echo '## Apply log'
            echo '```text'
            cat /tmp/apply-saved.log 2>/dev/null || true
            echo '```'
            echo
            echo '## Gradle log'
            echo '```text'
            tail -n 500 /tmp/gradle-saved.log 2>/dev/null || true
            echo '```'
          } > docs/development/validation/separate-air-ground.log.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/development/validation/separate-air-ground.log.md
          git commit -m "[skip separate-apply] Record separate combat validation failure"
          git push origin HEAD:agent/separate-air-ground-combat
