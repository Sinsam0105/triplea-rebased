name: Small Front CI

on:
  pull_request:
    branches:
      - variant-dev
  push:
    branches:
      - variant-dev
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply formatting and run focused tests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :game-core:spotlessApply :game-core:test :game-headless:test --stacktrace 2>&1 | tee gradle.log
          tar -czf formatted-fixed-reinforcement.tar.gz \
            game-app/game-core/src/main/java/games/strategy/triplea/attachments/FixedReinforcementAttachment.java \
            game-app/game-core/src/main/java/games/strategy/triplea/delegate/reinforcement \
            game-app/game-core/src/test/java/games/strategy/triplea/delegate/reinforcement

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-gradle-log
          path: gradle.log
          if-no-files-found: error

      - name: Upload formatted reinforcement sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formatted-fixed-reinforcement
          path: formatted-fixed-reinforcement.tar.gz
          if-no-files-found: error
