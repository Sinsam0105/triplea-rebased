name: Small Front CI

on:
  pull_request:
    branches:
      - variant-dev
  push:
    branches:
      - variant-dev
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Spotless patch
        shell: bash
        run: |
          set -o pipefail
          ./gradlew spotlessApply --stacktrace 2>&1 | tee spotless.log
          git diff --binary > spotless.patch

      - name: Upload formatted sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-formatted-sources
          path: |
            spotless.log
            spotless.patch
            game-app/game-core/src/main/java/games/strategy/triplea/delegate/battle/simulation
            game-app/game-core/src/test/java/games/strategy/triplea/delegate/battle/simulation
          if-no-files-found: error

      - name: Verify committed formatting
        shell: bash
        run: test ! -s spotless.patch
