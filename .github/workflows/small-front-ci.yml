name: Small Front CI

on:
  pull_request:
    branches:
      - variant-dev
  push:
    branches:
      - variant-dev
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply fog-of-war UI patch in CI workspace
        run: python tools/apply_fog_ui_patch.py

      - name: Format patched sources
        run: ./gradlew :game-core:spotlessApply

      - name: Archive patched UI sources
        run: |
          zip fog-ui-patched-sources.zip \
            game-app/game-core/src/main/java/games/strategy/triplea/ui/panels/map/MapPanel.java \
            game-app/game-core/src/main/java/games/strategy/triplea/ui/screen/TileManager.java \
            game-app/game-core/src/main/java/games/strategy/triplea/ui/screen/SmallMapImageManager.java
          git diff --binary > fog-ui-formatted.patch

      - name: Upload patched UI sources
        uses: actions/upload-artifact@v4
        with:
          name: fog-ui-patched-sources
          path: |
            fog-ui-patched-sources.zip
            fog-ui-formatted.patch
          if-no-files-found: error

      - name: Run focused tests and formatting checks
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :game-core:test :game-headless:test spotlessCheck --stacktrace 2>&1 | tee gradle.log

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-gradle-log
          path: gradle.log
          if-no-files-found: error
