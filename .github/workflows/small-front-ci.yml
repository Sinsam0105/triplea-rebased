name: Small Front CI

on:
  pull_request:
    branches:
      - variant-dev
  push:
    branches:
      - variant-dev
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: agent/milestone-12-fog-of-war
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply fog-of-war UI patch in CI workspace
        run: |
          if grep -q 'LocalPlayerVisibility' game-app/game-core/src/main/java/games/strategy/triplea/ui/screen/TileManager.java; then
            echo 'Fog-of-war UI patch already applied'
          else
            python - <<'PY'
          from pathlib import Path

          path = Path('tools/apply_fog_ui_patch.py')
          source = path.read_text()
          source = source.replace(
              "    if old not in text:\n"
              "        raise RuntimeError(f\"Expected source block not found in {path}: {old[:120]!r}\")\n"
              "    file.write_text(text.replace(old, new, 1))\n",
              "    if old not in text:\n"
              "        if new in text:\n"
              "            return\n"
              "        raise RuntimeError(f\"Expected source block not found in {path}: {old[:120]!r}\")\n"
              "    file.write_text(text.replace(old, new, 1))\n",
          )
          exec(compile(source, str(path), 'exec'))
          PY
          fi

      - name: Format patched sources
        run: ./gradlew :game-core:spotlessApply

      - name: Commit formatted UI sources
        run: |
          if git diff --quiet; then
            echo 'No UI source changes to commit'
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add \
              game-app/game-core/src/main/java/games/strategy/triplea/ui/panels/map/MapPanel.java \
              game-app/game-core/src/main/java/games/strategy/triplea/ui/screen/TileManager.java \
              game-app/game-core/src/main/java/games/strategy/triplea/ui/screen/SmallMapImageManager.java
            git commit -m 'Apply fog-of-war UI masking'
            git push origin HEAD:agent/milestone-12-fog-of-war
          fi

      - name: Run focused tests and formatting checks
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :game-core:test :game-headless:test spotlessCheck --stacktrace 2>&1 | tee gradle.log

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-gradle-log
          path: gradle.log
          if-no-files-found: error
