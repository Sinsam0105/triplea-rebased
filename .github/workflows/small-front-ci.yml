name: Small Front CI

on:
  push:
    branches:
      - agent/separate-air-ground-combat
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: separate-air-ground-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/separate-air-ground-combat'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: agent/separate-air-ground-combat
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply implementation
        run: python tools/apply_separate_air_ground_combat.py

      - name: Format and test
        shell: bash
        run: |
          set -o pipefail
          ./gradlew spotlessApply :game-core:test :game-headless:test --stacktrace 2>&1 | tee gradle.log

      - name: Commit validated implementation
        shell: bash
        run: |
          git fetch origin variant-dev
          git show origin/variant-dev:.github/workflows/small-front-ci.yml > .github/workflows/small-front-ci.yml
          rm tools/apply_separate_air_ground_combat.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Separate air and ground combat"
          git push origin HEAD:agent/separate-air-ground-combat

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: separate-air-ground-gradle-log
          path: gradle.log
          if-no-files-found: ignore
