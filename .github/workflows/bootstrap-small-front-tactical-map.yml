name: Bootstrap Small Front Tactical Map

on:
  push:
    branches:
      - agent/small-front-battalion-tactical-map
  pull_request:
    branches:
      - small-front-scoring
    paths:
      - tools/generate_small_front_meuse_map.py
      - .github/workflows/bootstrap-small-front-tactical-map.yml

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/small-front-battalion-tactical-map
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Generate scenario and map package
        run: |
          python -m pip install --disable-pip-version-check pillow
          python tools/generate_small_front_meuse_map.py
      - name: Format and verify scenario
        run: |
          set -o pipefail
          ./gradlew spotlessApply
          ./gradlew :smoke-testing:test --tests games.strategy.engine.data.SmallFrontMeuseScenarioTest --tests games.strategy.engine.data.SmallFrontAiGameTest 2>&1 | tee bootstrap-gradle.log
      - name: Capture failure log
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f bootstrap-gradle.log
          git commit -m "Capture tactical map bootstrap failure"
          git push origin HEAD:agent/small-front-battalion-tactical-map
      - name: Commit generated implementation
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/small-front-meuse-rulebook.md
          git add game-app/smoke-testing/src/test/java/games/strategy/engine/data/SmallFrontAiGameTest.java
          git add game-app/smoke-testing/src/test/java/games/strategy/engine/data/SmallFrontMeuseScenarioTest.java
          git add game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml
          git add tools/generate_small_front_meuse_map.py
          git add -f maps/small_front_meuse maps/small_front_meuse.zip
          git rm .github/workflows/bootstrap-small-front-tactical-map.yml
          git commit -m "Add battalion-scale Meuse rules and tactical map"
          git push origin HEAD:agent/small-front-battalion-tactical-map
