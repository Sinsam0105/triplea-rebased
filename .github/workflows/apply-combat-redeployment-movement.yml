name: Apply Combat Redeployment Movement

on:
  push:
    branches:
      - agent/combat-redeployment-movement
    paths:
      - tools/apply_combat_redeployment_movement.py
      - .github/workflows/apply-combat-redeployment-movement.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/combat-redeployment-movement
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Apply implementation
        run: python tools/apply_combat_redeployment_movement.py

      - name: Format and test
        run: ./gradlew spotlessApply :game-core:test --tests games.strategy.triplea.delegate.MovementAllowanceResolverTest --stacktrace

      - name: Commit implementation
        run: |
          rm tools/apply_combat_redeployment_movement.py
          rm .github/workflows/apply-combat-redeployment-movement.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add combat and redeployment movement rules"
          git push origin HEAD:agent/combat-redeployment-movement
