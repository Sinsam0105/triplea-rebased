name: Apply Fixed Reinforcement System

# The workflow is committed before this trigger update so the push event can execute it.
on:
  push:
    branches:
      - agent/fixed-reinforcement-system
    paths:
      - tools/apply_fixed_reinforcement_system.py
      - .github/workflows/apply-fixed-reinforcement-system.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/fixed-reinforcement-system
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Apply implementation
        run: python tools/apply_fixed_reinforcement_system.py

      - name: Format and test
        run: >-
          ./gradlew spotlessApply
          :game-core:test
          --tests games.strategy.triplea.attachments.FixedReinforcementAttachmentTest
          --tests games.strategy.triplea.delegate.reinforcement.FixedReinforcementTrackerTest
          --tests games.strategy.triplea.delegate.reinforcement.FixedReinforcementServiceTest
          --tests games.strategy.triplea.delegate.reinforcement.FixedReinforcementObservationFactoryTest
          --stacktrace

      - name: Commit implementation
        run: |
          rm tools/apply_fixed_reinforcement_system.py
          rm .github/workflows/apply-fixed-reinforcement-system.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add fixed reinforcement scenario system"
          git push origin HEAD:agent/fixed-reinforcement-system
