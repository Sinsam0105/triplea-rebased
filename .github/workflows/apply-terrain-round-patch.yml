name: Apply Terrain Round Wiring

on:
  push:
    branches:
      - agent/terrain-specific-battle-rounds
    paths:
      - tools/apply-terrain-round-patch.py
      - .github/workflows/apply-terrain-round-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/terrain-specific-battle-rounds
          fetch-depth: 0

      - name: Apply source replacements
        run: python tools/apply-terrain-round-patch.py

      - name: Commit generated source changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add game-app/game-core/src/main/java/games/strategy/triplea/delegate/battle/MustFightBattle.java
          git add game-app/game-core/src/main/java/games/strategy/triplea/delegate/battle/AirBattle.java
          git rm tools/apply-terrain-round-patch.py
          git rm .github/workflows/apply-terrain-round-patch.yml
          git commit -m 'Wire terrain battle round resolver'
          git push origin HEAD:agent/terrain-specific-battle-rounds
