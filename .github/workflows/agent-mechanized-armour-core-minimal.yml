name: Capture cleanup verify log

on:
  push:
    branches:
      - agent/mechanized-armour-support

permissions:
  contents: read

jobs:
  verify-log:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mechanized-armour-cleanup
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run Verify and capture output
        shell: bash
        run: |
          set +e
          ./verify --exclude-task spotlessApply > verify.log 2>&1
          echo $? > verify.status
          exit 0
      - name: Upload Verify log
        uses: actions/upload-artifact@v4
        with:
          name: mechanized-cleanup-verify-log
          path: |
            verify.log
            verify.status
          if-no-files-found: error
