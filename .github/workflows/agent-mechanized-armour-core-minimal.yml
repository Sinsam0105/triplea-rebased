name: Apply mechanized armour patch to target branch

on:
  push:
    branches:
      - agent/mechanized-armour-support
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mechanized-armour-combined-arms
          fetch-depth: 0

      - name: Execute target branch patch script
        id: patch
        shell: bash
        run: |
          set +e
          python3 - <<'PYRUN' > patch-run.log 2>&1
          from pathlib import Path

          workflow_path = Path('.github/workflows/apply-mechanized-armour-support.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n"
          if start_marker not in workflow or end_marker not in workflow:
              raise RuntimeError('embedded patch script markers not found')
          script = workflow.split(start_marker, 1)[1].split(end_marker, 1)[0]
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in script.splitlines()
          )
          exec(compile(script, str(workflow_path), 'exec'), {'__name__': '__main__'})
          PYRUN
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload patch execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mechanized-armour-patch-log
          path: patch-run.log
          if-no-files-found: error

      - name: Fail on patch error
        if: steps.patch.outputs.status != '0'
        shell: bash
        run: |
          cat patch-run.log
          exit 1

      - name: Commit target branch changes
        if: steps.patch.outputs.status == '0'
        shell: bash
        run: |
          rm -f .github/workflows/apply-mechanized-armour-support.yml
          rm -f .github/agent-mechanized-armour-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add mechanized armour combined-arms support"
          git push origin HEAD:agent/mechanized-armour-combined-arms
