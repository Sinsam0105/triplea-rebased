name: Apply mechanized armour core minimal

on:
  push:
    branches:
      - agent/mechanized-armour-support
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/mechanized-armour-support
          fetch-depth: 0

      - name: Replace mechanized rules
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          anchor = '<attachment name="unitAttachment" attachTo="mechanized"'
          attack_old = '<option name="attack" value="2"/>'
          attack_new = '<option name="attack" value="1"/>'
          support_name = "supportAttachmentMechanizedArmour"
          support = '''
              <attachment name="supportAttachmentMechanizedArmour" attachTo="mechanized" javaClass="games.strategy.triplea.attachments.UnitSupportAttachment" type="unitType">
                <option name="unitType" value="armour"/>
                <option name="faction" value="allied"/>
                <option name="side" value="offence"/>
                <option name="dice" value="strength"/>
                <option name="bonus" value="1"/>
                <option name="number" value="1"/>
                <option name="bonusType" value="mechanizedArmour"/>
              </attachment>'''

          paths = [
              Path("maps/small_front_meuse/map/games/Small_Front_Meuse.xml"),
              Path("game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml"),
              Path("tools/generate_small_front_meuse_map.py"),
          ]

          for path in paths:
              text = path.read_text(encoding="utf-8")
              start = text.index(anchor)
              end = text.index("</attachment>", start) + len("</attachment>")
              block = text[start:end]
              if attack_new not in block:
                  if attack_old not in block:
                      raise SystemExit(f"mechanized attack option missing in {path}")
                  block = block.replace(attack_old, attack_new, 1)
              replacement = block
              if support_name not in text:
                  replacement += support
              text = text[:start] + replacement + text[end:]
              path.write_text(text, encoding="utf-8")
              print(f"patched: {path}")
          PY

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            maps/small_front_meuse/map/games/Small_Front_Meuse.xml \
            game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml \
            tools/generate_small_front_meuse_map.py
          git commit -m "Add mechanized armour combined-arms support"
          git push origin HEAD:agent/mechanized-armour-support
