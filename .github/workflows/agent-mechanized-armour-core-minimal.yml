name: Apply mechanized armour core minimal

on:
  push:
    branches:
      - agent/mechanized-armour-support
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/mechanized-armour-support

      - name: Replace mechanized rules
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          anchor = '<attachment name="unitAttachment" attachTo="mechanized"'
          attack_old = '<option name="attack" value="2"/>'
          attack_new = '<option name="attack" value="1"/>'
          support_name = "supportAttachmentMechanizedArmour"
          support = '''
              <attachment name="supportAttachmentMechanizedArmour" attachTo="mechanized" javaClass="games.strategy.triplea.attachments.UnitSupportAttachment" type="unitType">
                <option name="unitType" value="armour"/>
                <option name="faction" value="allied"/>
                <option name="side" value="offence"/>
                <option name="dice" value="strength"/>
                <option name="bonus" value="1"/>
                <option name="number" value="1"/>
                <option name="bonusType" value="mechanizedArmour"/>
              </attachment>'''

          paths = sorted(Path.cwd().rglob("Small_Front_Meuse.xml"))
          paths.append(Path("tools/generate_small_front_meuse_map.py"))

          for path in paths:
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              if anchor not in text:
                  continue
              start = text.index(anchor)
              end = text.index("</attachment>", start) + len("</attachment>")
              block = text[start:end]
              if attack_new not in block:
                  block = block.replace(attack_old, attack_new, 1)
              replacement = block
              if support_name not in text:
                  replacement += support
              path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
              print(path)
          PY

          mkdir -p mechanized-patch/maps/small_front_meuse/map/games
          mkdir -p mechanized-patch/game-app/smoke-testing/src/test/resources/map-xmls
          mkdir -p mechanized-patch/tools
          cp maps/small_front_meuse/map/games/Small_Front_Meuse.xml mechanized-patch/maps/small_front_meuse/map/games/
          cp game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml mechanized-patch/game-app/smoke-testing/src/test/resources/map-xmls/
          cp tools/generate_small_front_meuse_map.py mechanized-patch/tools/

      - name: Upload patched files
        uses: actions/upload-artifact@v4
        with:
          name: mechanized-armour-patch
          path: mechanized-patch
          if-no-files-found: error
