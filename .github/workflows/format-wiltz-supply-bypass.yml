name: Format Wiltz supply bypass

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/wiltz-supply-bypass
          fetch-depth: 0
      - name: Fix XML indentation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          paths = [
              Path("maps/small_front_meuse/map/games/Small_Front_Meuse.xml"),
              Path("game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml"),
          ]
          wrong = '''    <attachment name="supplyTerritoryAttachment" attachTo="Libramont" javaClass="games.strategy.triplea.attachments.SupplyTerritoryAttachment" type="territory">
              <option name="roadConnection" value="Neufchateau"/>
            </attachment>
          '''
          right = '''    <attachment name="supplyTerritoryAttachment" attachTo="Libramont" javaClass="games.strategy.triplea.attachments.SupplyTerritoryAttachment" type="territory">
              <option name="roadConnection" value="Neufchateau"/>
            </attachment>
          '''
          # YAML block indentation normalizes the literal above, so build exact strings explicitly.
          wrong = "    <attachment name=\"supplyTerritoryAttachment\" attachTo=\"Libramont\" javaClass=\"games.strategy.triplea.attachments.SupplyTerritoryAttachment\" type=\"territory\">\n    <option name=\"roadConnection\" value=\"Neufchateau\"/>\n  </attachment>\n"
          right = "    <attachment name=\"supplyTerritoryAttachment\" attachTo=\"Libramont\" javaClass=\"games.strategy.triplea.attachments.SupplyTerritoryAttachment\" type=\"territory\">\n      <option name=\"roadConnection\" value=\"Neufchateau\"/>\n    </attachment>\n"
          for path in paths:
              text = path.read_text()
              if text.count(wrong) != 1:
                  raise RuntimeError(f"unexpected Libramont block in {path}")
              path.write_text(text.replace(wrong, right, 1))
              ET.parse(path)
          PY
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add maps/small_front_meuse/map/games/Small_Front_Meuse.xml \
                  game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml
          git commit -m "Format Wiltz supply bypass XML"
          git push origin HEAD:agent/wiltz-supply-bypass
