name: Finalize mechanized armour support

on:
  push:
    branches:
      - agent/mechanized-armour-support
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mechanized-armour-cleanup
          fetch-depth: 0

      - name: Clean XML and add regression coverage
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import xml.etree.ElementTree as ET

          support = '''    <attachment name="supportAttachmentMechanizedArmour" attachTo="mechanized" javaClass="games.strategy.triplea.attachments.UnitSupportAttachment" type="unitType">
                <option name="unitType" value="armour"/>
                <option name="faction" value="allied"/>
                <option name="side" value="offence"/>
                <option name="dice" value="strength"/>
                <option name="bonus" value="1"/>
                <option name="number" value="1"/>
                <option name="bonusType" value="mechanizedArmour"/>
                <option name="players" value="Germans"/>
              </attachment>'''
          pattern = re.compile(
              r'    <attachment name="supportAttachmentMechanizedArmour" '
              r'attachTo="mechanized" .*?    </attachment>',
              re.DOTALL,
          )
          for path in (
              Path('maps/small_front_meuse/map/games/Small_Front_Meuse.xml'),
              Path('game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml'),
          ):
              text = path.read_text(encoding='utf-8')
              text, count = pattern.subn(support, text, count=1)
              if count != 1:
                  raise RuntimeError(f'mechanized armour support not found in {path}')
              path.write_text(text, encoding='utf-8')
              ET.parse(path)

          rulebook = Path('docs/small-front-meuse-rulebook.md')
          text = rulebook.read_text(encoding='utf-8').replace(
              '- 이 지원은 독일군 mechanized에만 적용된다.\n\n\n## 5. 지형',
              '- 이 지원은 독일군 mechanized에만 적용된다.\n\n## 5. 지형',
          )
          rulebook.write_text(text, encoding='utf-8')

          test_path = Path('game-app/smoke-testing/src/test/java/games/strategy/engine/data/SmallFrontAiGameTest.java')
          test = test_path.read_text(encoding='utf-8')
          import_anchor = 'import games.strategy.net.websocket.ClientNetworkBridge;\n'
          imports = (
              'import games.strategy.triplea.attachments.UnitAttachment;\n'
              'import games.strategy.triplea.attachments.UnitSupportAttachment;\n'
          )
          if 'import games.strategy.triplea.attachments.UnitSupportAttachment;' not in test:
              test = test.replace(import_anchor, import_anchor + imports, 1)
          method = '''
  @Test
  void mechanizedArmourSupportEncodesCombinedArmsRule() {
    final GameData data = loadMap();
    final GamePlayer germans = data.getPlayerList().getPlayerId("Germans");
    final UnitAttachment mechanized =
        UnitAttachment.get(
            data.getUnitTypeList().getUnitTypeOrThrow("mechanized"), "unitAttachment");
    assertThat(mechanized.getAttack(germans)).isEqualTo(1);

    final UnitSupportAttachment support =
        UnitSupportAttachment.get(data.getUnitTypeList()).stream()
            .filter(
                rule ->
                    rule.getAttachedTo()
                        == data.getUnitTypeList().getUnitTypeOrThrow("mechanized"))
            .filter(
                rule ->
                    rule.getBonusType() != null
                        && rule.getBonusType().getName().equals("mechanizedArmour"))
            .findFirst()
            .orElseThrow();
    assertThat(support.getUnitType())
        .containsExactly(data.getUnitTypeList().getUnitTypeOrThrow("armour"));
    assertThat(support.getBonus()).isEqualTo(1);
    assertThat(support.getNumber()).isEqualTo(1);
    assertThat(support.getOffence()).isTrue();
    assertThat(support.getDefence()).isFalse();
    assertThat(support.getStrength()).isTrue();
    assertThat(support.getRoll()).isFalse();
    assertThat(support.getPlayers()).containsExactly(germans);
    assertThat(support.getBonusType()).isNotNull();
    assertThat(support.getBonusType().getCount()).isEqualTo(1);
  }

'''
          anchor = '  @Test\n  void nativeAirbasesProvideRearAreaScrambleAndAirControlPersists() {'
          if 'mechanizedArmourSupportEncodesCombinedArmsRule' not in test:
              if anchor not in test:
                  raise RuntimeError('Small Front test insertion point not found')
              test = test.replace(anchor, method + anchor, 1)
          test_path.write_text(test, encoding='utf-8')
          Path('patch-run.log').unlink(missing_ok=True)
          PY

      - name: Format Java
        run: ./gradlew spotlessApply --no-daemon

      - name: Commit cleanup branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean up mechanized armour support"
          git push origin HEAD:agent/mechanized-armour-cleanup
