name: Apply mechanized armour core rules

on:
  push:
    branches:
      - agent/mechanized-armour-support
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-core:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v7
        with:
          ref: agent/mechanized-armour-support
          fetch-depth: 0

      - name: Patch scenario XML and generator
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          from xml.etree import ElementTree

          root = Path.cwd()
          support_name = "supportAttachmentMechanizedArmour"
          support = '''    <attachment name="supportAttachmentMechanizedArmour" attachTo="mechanized" javaClass="games.strategy.triplea.attachments.UnitSupportAttachment" type="unitType">
                <option name="unitType" value="armour"/>
                <option name="faction" value="allied"/>
                <option name="side" value="offence"/>
                <option name="dice" value="strength"/>
                <option name="bonus" value="1"/>
                <option name="number" value="1"/>
                <option name="bonusType" value="mechanizedArmour"/>
              </attachment>'''
          block_pattern = re.compile(
              r'    <attachment name="unitAttachment" attachTo="mechanized".*?</attachment>',
              re.DOTALL,
          )

          def patch(path: Path) -> None:
              text = path.read_text(encoding="utf-8")
              match = block_pattern.search(text)
              if match is None:
                  raise RuntimeError(f"mechanized attachment missing: {path}")
              block = match.group(0)
              if '<option name="attack" value="1"/>' not in block:
                  changed, count = re.subn(
                      r'(<option name="attack" value=")2("/>)',
                      r'\g<1>1\2',
                      block,
                      count=1,
                  )
                  if count != 1:
                      raise RuntimeError(f"mechanized attack value missing: {path}")
                  block = changed
              replacement = block
              if support_name not in text:
                  replacement += "\n" + support
              text = text[:match.start()] + replacement + text[match.end():]
              path.write_text(text, encoding="utf-8")

          xmls = sorted(root.rglob("Small_Front_Meuse.xml"))
          if len(xmls) < 2:
              raise RuntimeError(f"expected map and test XML, found {xmls}")
          for xml in xmls:
              patch(xml)
              ElementTree.parse(xml)
              print(xml)

          generator = root / "tools" / "generate_small_front_meuse_map.py"
          patch(generator)
          print(generator)
          PY
          python -m py_compile tools/generate_small_front_meuse_map.py

      - name: Commit core rules
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/generate_small_front_meuse_map.py maps/small_front_meuse/map/games/Small_Front_Meuse.xml game-app
          git commit -m "Add mechanized armour combined-arms support"
          git push origin HEAD:agent/mechanized-armour-support
