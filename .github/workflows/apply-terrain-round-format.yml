name: Apply Terrain Round Formatting

on:
  push:
    branches:
      - agent/terrain-specific-battle-rounds
    paths:
      - .github/workflows/apply-terrain-round-format.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/terrain-specific-battle-rounds
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Apply Spotless and restore strict CI
        run: |
          ./gradlew :game-core:spotlessApply
          git fetch origin variant-dev
          git checkout origin/variant-dev -- .github/workflows/small-front-ci.yml
          git rm .github/workflows/apply-terrain-round-format.yml

      - name: Commit formatted sources
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add game-app/game-core/src/main/java
          git add game-app/game-core/src/test/java
          git add .github/workflows/small-front-ci.yml
          git commit -m 'Format terrain battle round changes'
          git push origin HEAD:agent/terrain-specific-battle-rounds
