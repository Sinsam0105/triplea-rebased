name: Operational Status Format Patch

on:
  pull_request:
    branches:
      - main
    paths:
      - 'game-app/game-core/src/**'
      - '.github/workflows/operational-status-format.yml'

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply Spotless
        run: ./gradlew :game-core:spotlessApply

      - name: Export patch
        shell: bash
        run: git diff -- game-app/game-core > operational-status-spotless.patch

      - name: Upload patch
        uses: actions/upload-artifact@v4
        with:
          name: operational-status-spotless-patch
          path: operational-status-spotless.patch
          if-no-files-found: error
