# Runs all build checks on any pull request or merges to main
name: Verify
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run Build Checks
        id: verify
        shell: bash
        run: |
          set +e
          ./verify --exclude-task spotlessApply > verify.log 2>&1
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Verify log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-verify-log
          path: verify.log
          if-no-files-found: error
      - name: Fail when Verify fails
        if: steps.verify.outputs.status != '0'
        run: |
          tail -200 verify.log
          exit 1
