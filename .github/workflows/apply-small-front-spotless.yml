name: Apply Small Front Formatting

on:
  pull_request:
    branches:
      - small-front-scoring
    paths:
      - .github/workflows/apply-small-front-spotless.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/small-front-battalion-tactical-map
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Apply repository formatting
        run: ./gradlew spotlessApply
      - name: Commit formatted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f verify-failure.log
          git rm -f .github/workflows/diagnose-small-front-verify.yml
          git rm .github/workflows/apply-small-front-spotless.yml
          git add -u
          git commit -m "Apply Small Front source formatting"
          git push origin HEAD:agent/small-front-battalion-tactical-map
