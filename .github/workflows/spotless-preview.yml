name: Spotless Preview

on:
  push:
    branches:
      - agent/milestone-10-air-control

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply game-core formatting
        run: ./gradlew :game-core:spotlessApply

      - name: Capture formatting patch
        run: git diff --binary > spotless.patch

      - name: Upload formatting patch
        uses: actions/upload-artifact@v4
        with:
          name: spotless-preview
          path: spotless.patch
          if-no-files-found: error
