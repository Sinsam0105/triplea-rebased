name: Diagnose Small Front Verify

on:
  push:
    branches:
      - agent/small-front-battalion-tactical-map
  pull_request:
    branches:
      - small-front-scoring
    paths:
      - .github/workflows/diagnose-small-front-verify.yml

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/small-front-battalion-tactical-map
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Run repository verification
        run: |
          set -o pipefail
          rm -f verify-failure.log
          ./verify --exclude-task spotlessApply 2>&1 | tee verify-failure.log
      - name: Capture verification failure
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f verify-failure.log
          git commit -m "Capture Small Front verification failure"
          git push origin HEAD:agent/small-front-battalion-tactical-map
      - name: Remove diagnostic workflow after success
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f verify-failure.log
          git rm .github/workflows/diagnose-small-front-verify.yml
          git commit -m "Remove Small Front verification diagnostic"
          git push origin HEAD:agent/small-front-battalion-tactical-map
