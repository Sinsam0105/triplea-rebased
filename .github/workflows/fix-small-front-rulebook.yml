name: Fix Small Front Rulebook Movement

on:
  push:
    branches:
      - agent/small-front-battalion-tactical-map
  pull_request:
    branches:
      - small-front-scoring
    paths:
      - .github/workflows/fix-small-front-rulebook.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/small-front-battalion-tactical-map
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Correct combat and redeployment movement documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          generator = Path('tools/generate_small_front_meuse_map.py')
          text = generator.read_text(encoding='utf-8')
          old = '    s = s.replace("- infantry, artillery: 1", "- 독일 보병·견인포병: 1\\n- 미군 보병: 2")\n'
          new = (
              '    s = s.replace("- infantry, artillery: 1", "- 독일 보병·견인포병: 1\\n- 미군 보병: 1", 1)\n'
              '    s = s.replace("- infantry, artillery: 1", "- 독일 보병·견인포병: 1\\n- 미군 보병: 2", 1)\n'
          )
          if old not in text:
              raise SystemExit('expected generator movement replacement not found')
          text = text.replace(old, new)
          text = text.replace(
              '    assertThat(unit(data, "americanInfantry").getRedeploymentMovement(americans)).isEqualTo(2);',
              '    assertThat(unit(data, "americanInfantry").getCombatMovement(americans)).isEqualTo(1);\\n'
              '    assertThat(unit(data, "americanInfantry").getRedeploymentMovement(americans)).isEqualTo(2);',
          )
          generator.write_text(text, encoding='utf-8')

          rulebook = Path('docs/small-front-meuse-rulebook.md')
          text = rulebook.read_text(encoding='utf-8')
          combat = '''### 8.1 전투 이동

전투 이동에서는 적 지역으로 진입해 전투를 만들 수 있다.

- 독일 보병·견인포병: 1
- 미군 보병: 2
- armour, mechanized: 2'''
          corrected = '''### 8.1 전투 이동

전투 이동에서는 적 지역으로 진입해 전투를 만들 수 있다.

- 독일 보병·견인포병: 1
- 미군 보병: 1
- armour, mechanized, selfPropelledArtillery: 2'''
          if combat not in text:
              raise SystemExit('expected rulebook combat movement block not found')
          rulebook.write_text(text.replace(combat, corrected), encoding='utf-8')

          test = Path('game-app/smoke-testing/src/test/java/games/strategy/engine/data/SmallFrontMeuseScenarioTest.java')
          text = test.read_text(encoding='utf-8')
          needle = '    assertThat(unit(data, "americanInfantry").getRedeploymentMovement(americans)).isEqualTo(2);'
          replacement = (
              '    assertThat(unit(data, "americanInfantry").getCombatMovement(americans)).isEqualTo(1);\\n'
              '    assertThat(unit(data, "americanInfantry").getRedeploymentMovement(americans)).isEqualTo(2);'
          )
          if replacement not in text:
              if needle not in text:
                  raise SystemExit('expected scenario movement assertion not found')
              text = text.replace(needle, replacement)
          test.write_text(text, encoding='utf-8')
          PY
      - name: Format and test
        run: |
          ./gradlew spotlessApply
          ./gradlew :game-core:test --tests games.strategy.triplea.delegate.supply.SupplyAwareMoveDelegateTest
          ./gradlew :smoke-testing:test --tests games.strategy.engine.data.SmallFrontMeuseScenarioTest --tests games.strategy.engine.data.SmallFrontAiGameTest
      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/small-front-meuse-rulebook.md
          git add tools/generate_small_front_meuse_map.py
          git add game-app/smoke-testing/src/test/java/games/strategy/engine/data/SmallFrontMeuseScenarioTest.java
          git add game-app/game-core/src/main/java/games/strategy/triplea/delegate/supply/SupplyAwareMoveDelegate.java
          git rm .github/workflows/fix-small-front-rulebook.yml
          git commit -m "Correct Meuse movement rules and supply validation"
          git push origin HEAD:agent/small-front-battalion-tactical-map
